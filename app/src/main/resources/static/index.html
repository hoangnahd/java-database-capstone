<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital CMS</title>
    <link rel="icon" type="image/png" href="/assets/images/logo/logo.png" />
    <link rel="stylesheet" href="/assets/css/index.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <script src="/js/render.js" defer></script>
    <script src="/js/util.js" defer></script>
    <script src="/js/components/header.js" defer></script>
    <script src="/js/components/footer.js" defer></script>
    <script type="module" src="/js/components/modals.js" defer></script>
    <script type="module" src="/js/index.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div id="header"></div>
        <main class="main-content">
          <section class="hero-card">
            <p class="eyebrow">Hospital CMS</p>
            <h2>Care coordination starts here.</h2>
            <p>Select your role to enter the appropriate dashboard and manage appointments with ease.</p>
            <div class="role-grid">
              <button class="role-card" data-role="admin">Admin Portal</button>
              <button class="role-card" data-role="doctor">Doctor Portal</button>
              <button class="role-card" data-role="patient">Patient Portal</button>
            </div>
          </section>
        </main>
        <div id="footer"></div>
      </div>
    </div>

    <div id="modal" class="modal">
      <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>
  </body>
</html>
