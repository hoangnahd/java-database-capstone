<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Healthcare Admin</p>
          <h1>Doctor Management Dashboard</h1>
        </div>
        <button id="refreshBtn" class="secondary-btn" type="button">Refresh</button>
      </header>

      <main class="dashboard">
        <section class="hero card" aria-labelledby="dashboardTitle">
          <div>
            <p class="eyebrow">Overview</p>
            <h2 id="dashboardTitle">Monitor and maintain your doctor directory</h2>
            <p class="hero-copy">
              Search doctors, review availability, and add new providers directly from this dashboard.
            </p>
          </div>
          <div class="stats-grid" aria-label="Dashboard statistics">
            <article class="stat-card">
              <span id="totalDoctors" class="stat-value">0</span>
              <span class="stat-label">Doctors</span>
            </article>
            <article class="stat-card">
              <span id="availableToday" class="stat-value">0</span>
              <span class="stat-label">Available slots</span>
            </article>
          </div>
        </section>

        <section class="controls card" aria-label="Search and filter controls">
          <form id="filterForm" class="controls-grid">
            <label class="field">
              <span>Search by name</span>
              <input id="searchInput" name="search" type="search" placeholder="Search doctors" />
            </label>

            <label class="field">
              <span>Time period</span>
              <select id="timeFilter" name="time">
                <option value="">All times</option>
                <option value="AM">AM</option>
                <option value="PM">PM</option>
              </select>
            </label>

            <label class="field">
              <span>Specialty</span>
              <select id="specialtyFilter" name="specialty">
                <option value="">All specialties</option>
              </select>
            </label>

            <button id="addDoctorBtn" class="primary-btn" type="button">Add doctor</button>
          </form>
        </section>

        <section class="content card" aria-labelledby="doctorListTitle">
          <div class="section-header">
            <h3 id="doctorListTitle">Doctors</h3>
            <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
          </div>
          <div id="doctorGrid" class="doctor-grid"></div>
        </section>
      </main>
    </div>

    <dialog id="doctorModal" class="modal">
      <form id="doctorForm" class="modal-form" method="dialog">
        <div class="modal-header">
          <h3>Add a new doctor</h3>
          <button id="closeModalBtn" class="icon-btn" type="button" aria-label="Close dialog">×</button>
        </div>

        <label class="field">
          <span>Full name</span>
          <input name="name" required />
        </label>

        <label class="field">
          <span>Email</span>
          <input name="email" type="email" required />
        </label>

        <label class="field">
          <span>Phone</span>
          <input name="phone" required />
        </label>

        <label class="field">
          <span>Password</span>
          <input name="password" type="password" required />
        </label>

        <label class="field">
          <span>Specialty</span>
          <input name="specialty" required />
        </label>

        <label class="field">
          <span>Available times</span>
          <input name="availableTimes" placeholder="09:00, 10:00, 14:00" />
        </label>

        <div class="modal-actions">
          <button class="secondary-btn" type="button" id="cancelBtn">Cancel</button>
          <button class="primary-btn" type="submit">Save doctor</button>
        </div>
      </form>
    </dialog>

    <script type="module" th:src="@{/js/adminDashboard.js}" defer></script>
  </body>
</html>
